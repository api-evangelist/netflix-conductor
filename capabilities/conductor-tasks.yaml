naftiko: 1.0.0-alpha2
info:
  label: Netflix Conductor REST API — Tasks
  description: 'Netflix Conductor REST API — Tasks. 5 operations. Lead operation: Update task status. Self-contained Naftiko
    capability covering one Netflix Conductor business surface.'
  tags:
  - Netflix Conductor
  - Tasks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NETFLIX_CONDUCTOR_API_KEY: NETFLIX_CONDUCTOR_API_KEY
capability:
  consumes:
  - type: http
    namespace: conductor-tasks
    baseUri: ''
    description: Netflix Conductor REST API — Tasks business capability. Self-contained, no shared references.
    resources:
    - name: tasks
      path: /tasks
      operations:
      - name: updatetask
        method: POST
        description: Update task status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tasks-poll-batch-taskType
      path: /tasks/poll/batch/{taskType}
      operations:
      - name: batchpolltasks
        method: GET
        description: Batch poll for tasks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskType
          in: path
          type: string
          required: true
        - name: workerid
          in: query
          type: string
        - name: count
          in: query
          type: integer
        - name: timeout
          in: query
          type: integer
    - name: tasks-poll-taskType
      path: /tasks/poll/{taskType}
      operations:
      - name: polltask
        method: GET
        description: Poll for a task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskType
          in: path
          type: string
          required: true
        - name: workerid
          in: query
          type: string
        - name: domain
          in: query
          type: string
    - name: tasks-queue-sizes
      path: /tasks/queue/sizes
      operations:
      - name: gettaskqueuesizes
        method: GET
        description: Get task queue sizes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskType
          in: query
          type: array
    - name: tasks-taskId
      path: /tasks/{taskId}
      operations:
      - name: gettask
        method: GET
        description: Get task details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskId
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: conductor-tasks-rest
    port: 8080
    description: REST adapter for Netflix Conductor REST API — Tasks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tasks
      name: tasks
      description: REST surface for tasks.
      operations:
      - method: POST
        name: updatetask
        description: Update task status
        call: conductor-tasks.updatetask
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tasks/poll/batch/{tasktype}
      name: tasks-poll-batch-tasktype
      description: REST surface for tasks-poll-batch-taskType.
      operations:
      - method: GET
        name: batchpolltasks
        description: Batch poll for tasks
        call: conductor-tasks.batchpolltasks
        with:
          taskType: rest.taskType
          workerid: rest.workerid
          count: rest.count
          timeout: rest.timeout
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tasks/poll/{tasktype}
      name: tasks-poll-tasktype
      description: REST surface for tasks-poll-taskType.
      operations:
      - method: GET
        name: polltask
        description: Poll for a task
        call: conductor-tasks.polltask
        with:
          taskType: rest.taskType
          workerid: rest.workerid
          domain: rest.domain
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tasks/queue/sizes
      name: tasks-queue-sizes
      description: REST surface for tasks-queue-sizes.
      operations:
      - method: GET
        name: gettaskqueuesizes
        description: Get task queue sizes
        call: conductor-tasks.gettaskqueuesizes
        with:
          taskType: rest.taskType
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tasks/{taskid}
      name: tasks-taskid
      description: REST surface for tasks-taskId.
      operations:
      - method: GET
        name: gettask
        description: Get task details
        call: conductor-tasks.gettask
        with:
          taskId: rest.taskId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: conductor-tasks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Netflix Conductor REST API — Tasks. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: update-task-status
      description: Update task status
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: conductor-tasks.updatetask
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: batch-poll-tasks
      description: Batch poll for tasks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: conductor-tasks.batchpolltasks
      with:
        taskType: tools.taskType
        workerid: tools.workerid
        count: tools.count
        timeout: tools.timeout
      outputParameters:
      - type: object
        mapping: $.
    - name: poll-task
      description: Poll for a task
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: conductor-tasks.polltask
      with:
        taskType: tools.taskType
        workerid: tools.workerid
        domain: tools.domain
      outputParameters:
      - type: object
        mapping: $.
    - name: get-task-queue-sizes
      description: Get task queue sizes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: conductor-tasks.gettaskqueuesizes
      with:
        taskType: tools.taskType
      outputParameters:
      - type: object
        mapping: $.
    - name: get-task-details
      description: Get task details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: conductor-tasks.gettask
      with:
        taskId: tools.taskId
      outputParameters:
      - type: object
        mapping: $.
