naftiko: 1.0.0-alpha2
info:
  label: Netflix Conductor REST API — Events
  description: 'Netflix Conductor REST API — Events. 2 operations. Lead operation: List event handlers. Self-contained Naftiko
    capability covering one Netflix Conductor business surface.'
  tags:
  - Netflix Conductor
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NETFLIX_CONDUCTOR_API_KEY: NETFLIX_CONDUCTOR_API_KEY
capability:
  consumes:
  - type: http
    namespace: conductor-events
    baseUri: ''
    description: Netflix Conductor REST API — Events business capability. Self-contained, no shared references.
    resources:
    - name: event
      path: /event
      operations:
      - name: listeventhandlers
        method: GET
        description: List event handlers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createeventhandler
        method: POST
        description: Create event handler
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: conductor-events-rest
    port: 8080
    description: REST adapter for Netflix Conductor REST API — Events. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/event
      name: event
      description: REST surface for event.
      operations:
      - method: GET
        name: listeventhandlers
        description: List event handlers
        call: conductor-events.listeventhandlers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createeventhandler
        description: Create event handler
        call: conductor-events.createeventhandler
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: conductor-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Netflix Conductor REST API — Events. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-event-handlers
      description: List event handlers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: conductor-events.listeventhandlers
      outputParameters:
      - type: object
        mapping: $.
    - name: create-event-handler
      description: Create event handler
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: conductor-events.createeventhandler
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
